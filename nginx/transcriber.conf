# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name transcriber.shazwan-danial.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name transcriber.shazwan-danial.com;

    ssl_certificate     /etc/letsencrypt/live/transcriber.shazwan-danial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transcriber.shazwan-danial.com/privkey.pem;
    include              /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam          /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Upload limit ──
    client_max_body_size 500M;

    # ── Static files ──
    location /static/ {
        alias /var/www/voice-change/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/voice-change/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy to Gunicorn ──
    location / {
        proxy_pass http://unix:/run/gunicorn/transcriber.sock;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout      300s;
        proxy_connect_timeout   60s;
        proxy_send_timeout      300s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
